version: 2
updates:
  # Ruby gems (Jekyll + Chirpy theme)
  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "build(deps)"

  # GitHub Actions used in the Pages deploy workflow
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci(deps)"
